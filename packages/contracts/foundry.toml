[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.27"
optimizer = true
optimizer_runs = 1_000_000
via_ir = true
remappings = [
  "forge-std/=lib/forge-std/src/",
  "@openzeppelin/=lib/openzeppelin-contracts/",
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"

[fuzz]
runs = 512
